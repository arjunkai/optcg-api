name: Weekly PTCG Refresh

on:
  schedule:
    # Mondays 08:00 UTC. Two hours after the OPTCG scrape (06:00 UTC)
    # so they don't contend on the same Cloudflare API quota.
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # auto-commit the pokemontcg-data submodule pointer
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Without this token the auto-commit step at the end pushes via
          # the default GITHUB_TOKEN; keep it explicit so credential
          # config in the runner survives a soft re-run.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      # ptcg-fetch.js is resumable — it reads existing cards-{lang}.json
      # and only re-fetches missing cards. Without a persisted cache,
      # every Monday would re-pull all ~23k cards from TCGdex. Cache
      # rolls forward each run via the unique key + restore-keys prefix.
      - name: Restore TCGdex cache
        uses: actions/cache@v4
        with:
          path: data/ptcg_cache
          key: ptcg-cache-${{ github.run_number }}
          restore-keys: |
            ptcg-cache-

      - name: Update pokemontcg-data submodule
        run: |
          git submodule update --remote data/pokemontcg-data
          git status --porcelain data/pokemontcg-data

      - name: Fetch TCGdex (incremental)
        run: node scripts/ptcg-fetch.js

      - name: Import TCGdex to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/ptcg-import-d1.js

      - name: Update flibustier TCG Pocket submodule
        run: |
          git submodule update --remote data/pokemon-tcg-pocket-database
          git status --porcelain data/pokemon-tcg-pocket-database

      - name: Merge pokemontcg-data (English image gap-fill)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-pokemontcg-d1.js

      - name: Merge flibustier TCG Pocket images
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-tcgpocket-d1.js

      - name: Merge pkmnbindr JP images (Scrydex CDN catalog)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-pkmnbindr-jp-d1.js

      # Bulk-INSERT JA cards that exist in pkmnbindr's 211-set catalog
      # but TCGdex doesn't carry. Idempotent via INSERT OR IGNORE — only
      # adds genuinely new rows on re-runs (initial run added ~19,547
      # cards on top of TCGdex's 5,935; subsequent weeks should add a
      # handful as new sets release).
      - name: Bulk-import pkmnbindr JP catalog (new card rows)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.import_pkmnbindr_jp_catalog

      # pkmnbindr uses legacy IDs (ECARD1, BASE1, GYM1) for vintage JA
      # sets while TCGdex uses (E1, PMCG1, PMCG5). This script does the
      # explicit ID + zero-padding mapping so images land on the canonical
      # TCGdex rows instead of duplicate pkmnbindr-keyed rows.
      - name: Backfill JA vintage images (E1-E5 / PMCG1-PMCG6)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_pkmnbindr_vintage_jp

      - name: Merge malie.io EN images (PTCGO/PTCGL game-client export)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-malie-en-d1.js

      # Live api.pokemontcg.io / Scrydex pull. Only carries TCGplayer
      # prices for the main TCG (no Pocket, no recent promos), so this
      # step refreshes USD prices for the ~17k cards in mapped sets
      # without disturbing manual or non-EN rows. Optional API key in
      # POKEMONTCG_API_KEY lifts the rate limit; current 165 req/run
      # fits comfortably under the 1k/day no-key cap.
      - name: Fetch live pokemontcg.io prices (USD)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
        run: node scripts/fetch-pokemontcg-prices.js

      - name: Setup Python (for eBay backfill)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt

      # eBay backfill is the LAST price source. Runs after manual,
      # pokemontcg, and cardmarket so it only fills genuine gaps. EN
      # cards search EBAY_US for USD; JA cards search EBAY_JP and
      # FX-convert via frankfurter.app. Stamps price_source='ebay_us'
      # or 'ebay_jp' — manual rows are protected by the WHERE clause.
      # Yuyutei (JP retailer) layered on top of pkmnbindr's catalog —
      # adds JP retail prices the catalog doesn't carry, plus images
      # for sets pkmnbindr's snapshot hasn't ingested yet. Runs BEFORE
      # eBay JP because retail prices are more stable than auction
      # noise; Yuyutei's UPDATE clause includes 'ebay_jp' so it will
      # supersede a prior eBay JP value if Yuyutei has the card.
      - name: Backfill JA images + prices via Yuyutei
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_yuyutei_jp

      # Hareruya2 (Shopify storefront, no Cloudflare). Walks 18 series-level
      # collections via /collections/{handle}/products.json, parses set+lid
      # from product titles, FX-converts JPY→USD. Runs after Yuyutei because
      # Yuyutei's catalog curation is tighter; Hareruya is supplementary
      # tier for cards Yuyutei doesn't carry. PoC 2026-05-04: ~923 cards
      # (+19.7% of unpriced JA tail). Reuses raw-product cache when present.
      - name: Backfill JA prices via Hareruya
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_ptcg_prices_hareruya

      - name: Backfill EN prices via eBay (US)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_prices_ebay --lang=en

      - name: Backfill JA prices via eBay (JP)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_prices_ebay --lang=ja

      # Last-resort image source for cards no other catalog covers (mep,
      # mfb, exu, tk-*, recent McDonald's promos). Requires ≥2 listings
      # sharing the same image URL — that's the floor for confidence
      # the URL points at the right card. Quality is lower than dedicated
      # scan sources but better than tinted placeholders for residuals.
      - name: Backfill EN images via eBay (US)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_images_ebay --lang=en

      - name: Backfill JA images via eBay (JP)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_images_ebay --lang=ja

      - name: Apply manual overrides
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-ptcg-manual-prices.js

      # Only the submodule pointer needs to be committed back; the
      # TCGdex cache lives in actions/cache (above) and isn't tracked.
      - name: Commit submodule pointers if changed
        run: |
          if ! git diff --quiet data/pokemontcg-data data/pokemon-tcg-pocket-database 2>/dev/null; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add data/pokemontcg-data data/pokemon-tcg-pocket-database
            git commit -m "chore: weekly submodule bump (pokemontcg-data, tcg-pocket)"
            git push
          else
            echo "No submodule changes — skipping commit."
          fi
