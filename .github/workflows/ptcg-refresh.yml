name: Weekly PTCG Refresh

# DAG split (2026-05-05): the original single-job pipeline kept hitting
# GitHub's hard 6h job ceiling mid-eBay-JA-prices step (~3700 cards
# rate-limited by eBay's per-app cap). Now structured as three jobs:
#
#   1) ingest-and-prices      — TCGdex import + image merges + every
#                               pricing source EXCEPT eBay JA prices.
#                               Includes eBay EN prices, eBay EN+JA
#                               images. ~2-3h typical.
#   2) ebay-ja-prices         — Just `backfill_ptcg_prices_ebay --lang=ja`,
#                               with its own 5.5h budget and a D1-backed
#                               cursor (migration 010). Kills cleanly
#                               30min before the 6h ceiling so the
#                               cursor write isn't truncated.
#   3) manual-overrides       — `import-ptcg-manual-prices.js`, runs
#                               LAST so manual rows always win even
#                               when eBay JA was timeout-killed.
#                               `if: !cancelled()` so a killed eBay JA
#                               doesn't block manual.
#
# Each job carries its own 6h budget. Cursor in eBay JA means even if
# week N is killed mid-cohort, week N+1 picks up where it stopped and
# eventually finishes the whole catalog. See migration 010 + the
# read_cursor/write_cursor helpers in scripts/backfill_ptcg_prices_ebay.py.

on:
  schedule:
    # Mondays 08:00 UTC. Two hours after the OPTCG scrape (06:00 UTC)
    # so they don't contend on the same Cloudflare API quota.
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

jobs:
  ingest-and-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5h cap; healthy headroom over typical ~2-3h walltime
    permissions:
      contents: write   # auto-commit the submodule pointers
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      # ptcg-fetch.js is resumable — it reads existing cards-{lang}.json
      # and only re-fetches missing cards. Without a persisted cache,
      # every Monday would re-pull all ~23k cards from TCGdex. Cache
      # rolls forward each run via the unique key + restore-keys prefix.
      - name: Restore TCGdex cache
        uses: actions/cache@v4
        with:
          path: data/ptcg_cache
          key: ptcg-cache-${{ github.run_number }}
          restore-keys: |
            ptcg-cache-

      # JA name_en map drives latin-script search of Japanese cards
      # (e.g. typing "Charmander" finds JA ヒトカゲ rows). Same rolling-
      # cache pattern as the TCGdex cache — first run regenerates from
      # scratch (~50 min for 24k cards), subsequent runs only resolve
      # newly-imported cards (~seconds).
      - name: Restore JA name_en cache
        uses: actions/cache@v4
        with:
          path: data/ja_card_id_to_en_name.json
          key: ptcg-name-en-${{ github.run_number }}
          restore-keys: |
            ptcg-name-en-

      - name: Update pokemontcg-data submodule
        run: |
          git submodule update --remote data/pokemontcg-data
          git status --porcelain data/pokemontcg-data

      - name: Fetch TCGdex (incremental)
        run: node scripts/ptcg-fetch.js

      - name: Import TCGdex to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/ptcg-import-d1.js

      - name: Update flibustier TCG Pocket submodule
        run: |
          git submodule update --remote data/pokemon-tcg-pocket-database
          git status --porcelain data/pokemon-tcg-pocket-database

      - name: Merge pokemontcg-data (English image gap-fill)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-pokemontcg-d1.js

      # TCG Pocket import disabled 2026-05-05 — Pocket is digital-only,
      # no physical secondary market. ptcg-import-d1.js drops Pocket
      # sets at the source.

      - name: Merge pkmnbindr JP images (Scrydex CDN catalog)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-pkmnbindr-jp-d1.js

      # pkmnbindr's 211-set catalog covers JA cards TCGdex doesn't carry.
      # Idempotent INSERT OR IGNORE.
      - name: Bulk-import pkmnbindr JP catalog (new card rows)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.import_pkmnbindr_jp_catalog

      # ID + zero-pad mapping so legacy IDs (ECARD1/BASE1/GYM1) land on
      # the canonical TCGdex rows (E1/PMCG1/PMCG5).
      - name: Backfill JA vintage images (E1-E5 / PMCG1-PMCG6)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_pkmnbindr_vintage_jp

      - name: Merge malie.io EN images (PTCGO/PTCGL game-client export)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-malie-en-d1.js

      # Live api.pokemontcg.io / Scrydex pull. Only carries TCGplayer
      # prices for the main TCG. Refreshes USD prices for the ~17k
      # cards in mapped sets without disturbing manual or non-EN rows.
      - name: Fetch live pokemontcg.io prices (USD)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
        run: node scripts/fetch-pokemontcg-prices.js

      - name: Setup Python (for eBay + Yuyutei + Hareruya + enrich)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Refresh the JA → EN name map for any new JA cards that landed
      # this week. Incremental — only resolves cards not already in the
      # cached JSON. ptcg_cards.name_en gets repopulated by the next
      # step. Skips with --all/--rebuild because those are reserved for
      # manual one-shots after a logic fix.
      - name: Enrich JA name_en map (incremental)
        continue-on-error: true
        run: python -m scripts.enrich_ja_card_names --all-unpriced

      - name: Push name_en updates to D1
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/backfill-ptcg-name-en.js

      # Yuyutei (JP retailer) layered on top of pkmnbindr's catalog.
      # Runs BEFORE eBay JP because retail prices are more stable than
      # auction noise. Yuyutei's UPDATE clause includes 'ebay_jp' so it
      # supersedes a prior eBay JP value if Yuyutei has the card.
      - name: Backfill JA images + prices via Yuyutei
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_yuyutei_jp

      # Hareruya2 (Shopify storefront, no Cloudflare). Walks 18 series-
      # level collections via /collections/{handle}/products.json,
      # parses set+lid from product titles, FX-converts JPY→USD. Runs
      # after Yuyutei because Yuyutei's catalog curation is tighter.
      - name: Backfill JA prices via Hareruya
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_ptcg_prices_hareruya

      # TCGCSV (community TCGPlayer mirror snapshot). Fills NULL rows
      # pokemontcg.io / yuyutei / hareruya missed — same gate as every
      # source, so claimed cards stay claimed. The May-13 manual run
      # hit ~17k JA cards; wiring it here keeps that coverage from
      # rotting as new cards enter via TCGdex.
      - name: Backfill EN prices via TCGCSV (TCGPlayer mirror)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_ptcg_prices_tcgcsv --lang=en

      - name: Backfill JA prices via TCGCSV (TCGPlayer mirror)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_ptcg_prices_tcgcsv --lang=ja

      # PriceCharting closes the vintage JA tail (PCG / Holon / neo /
      # ADV / e-Card / BS eras) that retail sources don't carry. NULL-
      # only gate; the May-13 manual run captured ~3.8k vintage cards.
      - name: Backfill JA vintage prices via PriceCharting
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python -m scripts.backfill_ptcg_prices_pricecharting

      - name: Backfill EN prices via eBay (US)
        continue-on-error: true
        timeout-minutes: 90
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_prices_ebay --lang=en

      # eBay image backfills are last-resort sources for cards no other
      # catalog covers. Cohort is small (hundreds, not thousands) so
      # they fit comfortably in this job alongside everything else.
      - name: Backfill EN images via eBay (US)
        continue-on-error: true
        timeout-minutes: 60
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_images_ebay --lang=en

      - name: Backfill JA images via eBay (JP)
        continue-on-error: true
        timeout-minutes: 60
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_images_ebay --lang=ja

      # Submodule pointers committed here at the end of the ingest job.
      # Even if eBay JA prices fails downstream, the data updates from
      # this job still land in git history.
      - name: Commit submodule pointers if changed
        run: |
          if ! git diff --quiet data/pokemontcg-data data/pokemon-tcg-pocket-database 2>/dev/null; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add data/pokemontcg-data data/pokemon-tcg-pocket-database
            git commit -m "chore: weekly submodule bump (pokemontcg-data, tcg-pocket)"
            git push
          else
            echo "No submodule changes — skipping commit."
          fi

  ebay-ja-prices:
    # Isolated job for the long-pole eBay JA pricing step. Gets its own
    # 6h budget; uses a D1-backed cursor so a 6h kill preserves progress
    # for week N+1 to pick up. timeout-minutes is set to 330 (5.5h) so
    # the cursor write isn't truncated by GH's hard kill at 6h.
    needs: ingest-and-prices
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Backfill JA prices via eBay (JP) with cursor resume
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: python -m scripts.backfill_ptcg_prices_ebay --lang=ja

  manual-overrides:
    # Runs LAST so manual_prices.json wins over every automated source.
    # `if: !cancelled()` so even a timeout-killed eBay JA doesn't block
    # the manual sweep — manual is small (~1min) and always-applied.
    needs: ebay-ja-prices
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Apply manual overrides
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/import-ptcg-manual-prices.js

      # Coverage snapshot — surfaces "what did this run actually do" in
      # the workflow logs so a silently-failing source is visible at a
      # glance instead of requiring a manual D1 query. Counts are also
      # piped to the Discord notify step below.
      - name: Report PTCG pricing coverage
        id: coverage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SQL="SELECT lang, COUNT(*) AS total, SUM(CASE WHEN price_source IS NOT NULL THEN 1 ELSE 0 END) AS priced FROM ptcg_cards GROUP BY lang ORDER BY lang"
          OUT=$(npx wrangler d1 execute optcg-cards --remote --json --command "$SQL" 2>&1 || echo '{}')
          echo "$OUT"
          # Pull priced counts per lang into individual outputs for the notify step.
          EN=$(echo "$OUT" | python3 -c "import json,sys; d=json.load(sys.stdin); rows=d[0]['results'] if isinstance(d,list) else d.get('results',[]); print(next((r['priced'] for r in rows if r.get('lang')=='en'),0))" 2>/dev/null || echo 0)
          JA=$(echo "$OUT" | python3 -c "import json,sys; d=json.load(sys.stdin); rows=d[0]['results'] if isinstance(d,list) else d.get('results',[]); print(next((r['priced'] for r in rows if r.get('lang')=='ja'),0))" 2>/dev/null || echo 0)
          echo "en_priced=$EN" >> "$GITHUB_OUTPUT"
          echo "ja_priced=$JA" >> "$GITHUB_OUTPUT"
          echo "## PTCG coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "EN priced: $EN | JA priced: $JA" >> "$GITHUB_STEP_SUMMARY"

      # Purge Cloudflare edge cache for /cards/index and /pokemon/cards/*
      # responses so the fresh D1 data is visible to users immediately
      # instead of waiting 1h fresh + 24h stale-while-revalidate to roll
      # over. continue-on-error so a cache API blip doesn't fail the run.
      - name: Purge Cloudflare edge cache
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "CLOUDFLARE_ZONE_ID not set — skipping cache purge (Workers.dev URLs aren't zone-cached anyway)"
            exit 0
          fi
          curl -sX POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"prefixes":["optcg-api.arjunbansal-ai.workers.dev/cards/","optcg-api.arjunbansal-ai.workers.dev/pokemon/"]}'
          echo

      # Discord ping with the coverage numbers + a link to the run. Posts
      # regardless of success/failure (if: always()) so a silently-killed
      # earlier job still surfaces. continue-on-error so a webhook outage
      # doesn't fail the cron.
      - name: Notify Discord
        if: always()
        continue-on-error: true
        env:
          DISCORD_CRON_WEBHOOK: ${{ secrets.DISCORD_CRON_WEBHOOK }}
          EN_PRICED: ${{ steps.coverage.outputs.en_priced }}
          JA_PRICED: ${{ steps.coverage.outputs.ja_priced }}
        run: |
          if [ -z "$DISCORD_CRON_WEBHOOK" ]; then
            echo "DISCORD_CRON_WEBHOOK not set — skipping"; exit 0
          fi
          STATUS_ICON=$([ "${{ job.status }}" = "success" ] && echo ":white_check_mark:" || echo ":warning:")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sX POST "$DISCORD_CRON_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"$STATUS_ICON Weekly PTCG refresh finished\\nEN priced: \`${EN_PRICED:-?}\` | JA priced: \`${JA_PRICED:-?}\`\\n<$RUN_URL>\"}"
